<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarot Mágico</title>
    <!-- Fuente elegante: Playfair Display -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Tarot Mágico</h1>
        <div class="tarot-card" id="tarotCard">
            <div class="card-front" id="cardFront">
                <!-- Imagen de la carta roja (Portada) -->
                <img id="cartaImagen" src="img/carta1.png" alt="Carta de Tarot" />
            </div>
            <div class="card-back" id="cardBack">
                <!-- Imagen de la carta negra (Reverso) -->
                <img src="img/carta2.png" class="back-img" />
                <span id="fortuneText"></span>
            </div>
        </div>
    </div>
    <script src="script.js"></script>

    
</body>
</html>
